name: CI

# Runs lint + typecheck + unit tests, plus a secret-leak scan, on every push
# and PR. Free (GitHub Actions), no Anthropic API calls. A red check here means
# a broken build — fix before it reaches Vercel.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  # Scans the repo (and full git history) for accidentally committed secrets
  # like API keys. Uses the gitleaks CLI directly — the gitleaks-action now
  # demands a (paid-for-orgs) GITLEAKS_LICENSE key even on personal repos; the
  # CLI has no such gate and is free.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/
      - name: Scan git history for secrets
        run: gitleaks detect --source . --redact --no-banner
