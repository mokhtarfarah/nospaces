name: CI

# Runs typecheck + unit tests on every push and PR. Free (GitHub Actions),
# no Anthropic API calls. A red check here means a broken build — fix before
# it reaches Vercel.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
